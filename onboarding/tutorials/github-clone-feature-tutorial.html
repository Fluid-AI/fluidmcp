<html lang="en">

<style>

  .nav-label{font-size:13px;color:var(--text2);line-height:1.3}
  .nav-item.active .nav-label{color:var(--text);font-weight:500}
  .main{margin-left:280px;flex:1;min-height:100vh}
  .lesson{display:none;padding:48px 56px;max-width:900px;animation:slideInUp 0.4s ease both}
  .lesson.active{display:block}
  @keyframes slideInUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
  .lesson-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(210,168,255,0.1);border:1px solid rgba(210,168,255,0.25);border-radius:20px;padding:4px 14px;font-size:11px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:1px;margin-bottom:16px}
  .lesson-title{font-size:32px;font-weight:700;color:var(--text);margin-bottom:8px;line-height:1.2}

  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:16px;margin-bottom:28px}
  .card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:22px;transition:all 0.25s;animation:slideInUp 0.4s ease both}
  .card:hover{transform:translateY(-4px);box-shadow:0 16px 40px rgba(0,0,0,0.4);border-color:rgba(210,168,255,0.3)}
  .card:nth-child(1){animation-delay:0.05s}.card:nth-child(2){animation-delay:0.1s}.card:nth-child(3){animation-delay:0.15s}
  .card-icon{font-size:24px;margin-bottom:10px}.card-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:6px}
  .card-text{font-size:13px;color:var(--text2);line-height:1.6}
  .code-block{background:#010409;border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:20px}
  .code-header{background:var(--bg3);padding:8px 16px;border-bottom:1px solid var(--border)}
  .code-lang{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:1px}
  .code-body{padding:18px 20px;overflow-x:auto}
  .code-body pre{font-family:'JetBrains Mono',monospace;font-size:13px;line-height:1.7;color:#c9d1d9;white-space:pre}
  .kw{color:#ff7b72}.str{color:#a5d6ff}.cm{color:#8b949e;font-style:italic}.fn{color:#d2a8ff}.num{color:#79c0ff}.var{color:#ffa657}
  .info-box{background:rgba(210,168,255,0.07);border:1px solid rgba(210,168,255,0.25);border-radius:10px;padding:16px 20px;margin-bottom:20px;display:flex;gap:12px}
  .warn-box{background:rgba(247,129,102,0.07);border:1px solid rgba(247,129,102,0.3);border-radius:10px;padding:16px 20px;margin-bottom:20px;display:flex;gap:12px}
  .ok-box{background:rgba(63,185,80,0.07);border:1px solid rgba(63,185,80,0.3);border-radius:10px;padding:16px 20px;margin-bottom:20px;display:flex;gap:12px}
  .box-icon{font-size:18px;flex-shrink:0;margin-top:1px}.box-text{font-size:13px;color:var(--text2);line-height:1.6}
  .box-text strong{color:var(--text)}
  .directory-tree{background:#010409;border:1px solid rgba(210,168,255,0.2);border-radius:10px;padding:20px;margin-bottom:20px;font-family:'JetBrains Mono',monospace;font-size:13px;line-height:1.8}
  .dir-line{margin-bottom:4px}
  .dir-icon{color:var(--accent2);margin-right:8px}
  .dir-name{color:var(--text)}
  .dir-highlight{color:var(--accent);font-weight:600}
  .dir-comment{color:var(--text3);margin-left:12px}
  .dir-indent-1{padding-left:24px}

  .dir-indent-3{padding-left:72px}
  .flow-table{width:100%;border-collapse:collapse;margin-bottom:20px;font-size:13px}
  .flow-table th{background:var(--bg3);padding:10px 14px;text-align:left;color:var(--text2);font-weight:600;font-size:12px;text-transform:uppercase;border-bottom:1px solid var(--border)}
  .flow-table td{padding:10px 14px;border-bottom:1px solid rgba(210,168,255,0.07);color:var(--text2);vertical-align:top}
  .flow-table td:first-child{color:var(--accent);font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600}
  .flow-table tr:last-child td{border-bottom:none}
  h3{font-size:16px;font-weight:600;color:var(--text);margin:24px 0 12px}
  p{font-size:14px;color:var(--text2);line-height:1.7;margin-bottom:14px}
  code{font-family:'JetBrains Mono',monospace;background:rgba(210,168,255,0.1);padding:2px 6px;border-radius:4px;font-size:12px;color:var(--accent)}
  .complete-btn{display:inline-flex;align-items:center;gap:8px;margin-top:32px;padding:12px 24px;background:linear-gradient(135deg,var(--accent),#8b5cf6);border:none;border-radius:8px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s}
  .complete-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(210,168,255,0.3)}
  .complete-btn.done{background:linear-gradient(135deg,var(--accent3),#238636)}
  .flow-diagram{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:24px}
  .flow-step{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:12px}
  .flow-step-number{display:inline-block;width:24px;height:24px;background:var(--accent);color:#000;border-radius:50%;text-align:center;line-height:24px;font-weight:700;font-size:12px;margin-right:12px}
  .flow-step-title{display:inline;font-weight:600;color:var(--text)}
  .flow-step-desc{margin-top:8px;color:var(--text2);font-size:13px}
</style>

<script>
const lessons = [
  {
    id:1,title:"Introduction",sub:"How FluidMCP clones GitHub repositories and launches MCP servers",
    content:`
      <p>FluidMCP enables you to run MCP servers directly from GitHub repositories using a single command. This tutorial explains the complete flow from CLI input to running HTTP server.</p>
      <div class="cards">
        <div class="card"><div class="card-icon">&#x1F4E5;</div><div class="card-title">Clone & Launch</div><div class="card-text">Shallow clone repositories with git, extract metadata from README, and launch MCP servers with subprocess management.</div></div>
        <div class="card"><div class="card-icon">&#x1F527;</div><div class="card-title">Metadata Extraction</div><div class="card-text">Automatically extracts MCP server configuration from README files when metadata.json doesn't exist.</div></div>
        <div class="card"><div class="card-icon">&#x1F680;</div><div class="card-title">FastAPI Proxy</div><div class="card-text">Creates dynamic HTTP routes that proxy JSON-RPC requests to MCP subprocesses via stdin/stdout pipes.</div></div>
      </div>
      <div class="info-box"><div class="box-icon">&#x2139;</div><div class="box-text"><strong>Command:</strong> <code>fluidmcp github owner/repo --github-token TOKEN --start-server</code> clones the repo and starts an HTTP server on port 8090.</div></div>
      <h3>Key Steps Overview</h3>
      <div class="flow-diagram">
        <div class="flow-step">
          <span class="flow-step-number">1</span>
          <span class="flow-step-title">Parse & Validate</span>
          <div class="flow-step-desc">CLI parses arguments, validates GitHub token, normalizes repository URL</div>
        </div>
        <div class="flow-step">
          <span class="flow-step-number">2</span>
          <span class="flow-step-title">Clone Repository</span>
          <div class="flow-step-desc">Shallow clone with <code>git clone --depth 1</code> to <code>.fmcp-packages/owner/repo/branch/</code></div>
        </div>
        <div class="flow-step">
          <span class="flow-step-number">3</span>
          <span class="flow-step-title">Extract Metadata</span>
          <div class="flow-step-desc">Use existing metadata.json or extract from README using regex patterns</div>
        </div>
        <div class="flow-step">
          <span class="flow-step-number">4</span>
          <span class="flow-step-title">Launch MCP Server</span>
          <div class="flow-step-desc">Spawn subprocess with stdin/stdout pipes, perform JSON-RPC handshake</div>
        </div>
        <div class="flow-step">
          <span class="flow-step-number">5</span>
          <span class="flow-step-title">Create FastAPI Router</span>
          <div class="flow-step-desc">Generate dynamic routes for JSON-RPC proxy, SSE streaming, tool discovery</div>
        </div>
        <div class="flow-step">
          <span class="flow-step-number">6</span>
          <span class="flow-step-title">Start Uvicorn</span>
          <div class="flow-step-desc">Bind HTTP server to port 8090, serve Swagger UI at <code>/docs</code></div>
        </div>
      </div>
    `
  },
  {
    id:2,title:"Directory Structure",sub:"Complete codebase organization for GitHub clone feature",
    content:`
      <p>This lesson shows WHERE the code lives in the FluidMCP codebase. Understanding this structure is critical for navigating and modifying the GitHub clone flow.</p>
      <h3>Complete File Organization</h3>
      <div class="directory-tree">
        <div class="dir-line">
          <span class="dir-icon">&#x1F4C1;</span>
          <span class="dir-name">fluidmcp/</span>
        </div>

        <div class="dir-line dir-indent-1">
          <span class="dir-icon">&#x1F4C1;</span>
          <span class="dir-name">cli/</span>
        </div>

        <div class="dir-line dir-indent-2">
          <span class="dir-icon">&#x1F4C4;</span>
          <span class="dir-highlight">cli.py</span>
          <span class="dir-comment"># Entry point - github_command() function</span>
        </div>

        <div class="dir-line dir-indent-2">
          <span class="dir-icon">&#x1F4C1;</span>
          <span class="dir-name">services/</span>
        </div>

        <div class="dir-line dir-indent-3">
          <span class="dir-icon">&#x1F4C4;</span>
          <span class="dir-highlight">github_utils.py</span>
          <span class="dir-comment"># Clone, normalize URL, metadata extraction</span>
        </div>

        <div class="dir-line dir-indent-3">
          <span class="dir-icon">&#x1F4C4;</span>
          <span class="dir-highlight">package_launcher.py</span>
          <span class="dir-comment"># Launch MCP subprocess, JSON-RPC init</span>
        </div>

        <div class="dir-line dir-indent-3">
          <span class="dir-icon">&#x1F4C4;</span>
          <span class="dir-name">config_resolver.py</span>
          <span class="dir-comment"># Unified config resolution (calls github_utils)</span>
        </div>
      </div>
      <h3>Key Files and Their Roles</h3>
      <table class="flow-table">
        <thead><tr><th>File</th><th>Key Functions</th><th>Purpose</th></tr></thead>
        <tbody>
          <tr><td>cli.py</td><td>github_command()</td><td>CLI entry point, argument parsing, orchestration</td></tr>
          <tr><td>github_utils.py</td><td>clone_github_repo()<br>normalize_github_repo()<br>extract_or_create_metadata()</td><td>Git operations, URL parsing, README extraction</td></tr>
          <tr><td>package_launcher.py</td><td>launch_mcp_using_fastapi_proxy()<br>initialize_mcp_server()<br>create_mcp_router()</td><td>Subprocess management, JSON-RPC, FastAPI routing</td></tr>
        </tbody>
      </table>
      <div class="ok-box"><div class="box-icon">&#x2705;</div><div class="box-text"><strong>Start here:</strong> <code>cli.py:github_command()</code> is the entry point. It calls <code>github_utils.py:clone_github_repo()</code> then <code>package_launcher.py:launch_mcp_using_fastapi_proxy()</code></div></div>
      <h3>Data Flow Between Components</h3>
      <p>CLI → github_utils (clone) → github_utils (extract metadata) → package_launcher (spawn process) → package_launcher (create router) → uvicorn (start server)</p>
    `
  },
  {
    id:3,title:"Core Concepts",sub:"Key terminology and patterns used in the GitHub clone flow",
    content:`
      <h3>Essential Terminology</h3>
      <div class="cards">
        <div class="card"><div class="card-icon">&#x1F4E6;</div><div class="card-title">Shallow Clone</div><div class="card-text"><code>git clone --depth 1</code> fetches only the latest commit, not full history. Saves time and disk space.</div></div>
        <div class="card"><div class="card-icon">&#x1F4C4;</div><div class="card-title">Metadata Extraction</div><div class="card-text">Parses JSON blocks from README using regex to find triple-backtick code blocks with optional json language tag.</div></div>
        <div class="card"><div class="card-icon">&#x1F50C;</div><div class="card-title">JSON-RPC Handshake</div><div class="card-text">Sends <code>{"jsonrpc":"2.0","method":"initialize",...}</code> to MCP process via stdin, reads response from stdout.</div></div>
        <div class="card"><div class="card-icon">&#x1F680;</div><div class="card-title">Dynamic Router</div><div class="card-text">FastAPI router created at runtime with endpoints like <code>POST /{server}/mcp</code> that proxy to subprocess.</div></div>
      </div>
      <h3>URL Normalization</h3>
      <div class="code-block"><div class="code-header"><span class="code-lang">python</span></div><div class="code-body"><pre><span class="cm"># github_utils.py:22-54</span>
<span class="kw">def</span> <span class="fn">normalize_github_repo</span>(repo_path: str):
    <span class="cm"># Removes https://, github.com, .git</span>
    <span class="cm"># Input: "https://github.com/owner/repo.git"</span>
    <span class="cm"># Output: ("owner", "repo")</span>
    repo_path = repo_path.replace(<span class="str">"https://"</span>, <span class="str">""</span>)
    repo_path = repo_path.replace(<span class="str">".git"</span>, <span class="str">""</span>)
    parts = repo_path.split(<span class="str">"/"</span>)
    <span class="kw">if</span> len(parts) == <span class="num">2</span>:
        <span class="kw">return</span> (parts[<span class="num">0</span>], parts[<span class="num">1</span>])
    <span class="kw">raise</span> ValueError(<span class="str">"Invalid format"</span>)</pre></div></div>
      <div class="info-box"><div class="box-icon">&#x1F4A1;</div><div class="box-text"><strong>Working Directory:</strong> MCP servers run in <code>.fmcp-packages/owner/repo/branch/</code>. For <code>npx -y</code> commands, this is the parent directory; for source code commands, it's the repo root.</div></div>
    `
  },
  {
    id:4,title:"Clone & Metadata",sub:"Repository cloning and metadata extraction process",
    content:`
      <h3>Clone Process</h3>
      <div class="code-block"><div class="code-header"><span class="code-lang">python</span></div><div class="code-body"><pre><span class="cm"># github_utils.py:57-179</span>
<span class="kw">def</span> <span class="fn">clone_github_repo</span>(repo_path, branch, github_token, install_dir):
    owner, repo = normalize_github_repo(repo_path)
    dest_dir = install_dir / owner / repo / branch

    <span class="cm"># Check if already cloned</span>
    <span class="kw">if</span> dest_dir.exists():
        logger.info(<span class="str">f"Repo already exists: {dest_dir}"</span>)
        <span class="kw">return</span> dest_dir

    <span class="cm"># Build clone URL with token</span>
    clone_url = <span class="str">f"https://{github_token}@github.com/{owner}/{repo}.git"</span>

    <span class="cm"># Execute git clone</span>
    result = subprocess.run([
        <span class="str">"git"</span>, <span class="str">"clone"</span>, <span class="str">"--depth"</span>, <span class="str">"1"</span>,
        <span class="str">"--branch"</span>, branch, clone_url, str(dest_dir)
    ])

    <span class="kw">if</span> result.returncode != <span class="num">0</span>:
        <span class="kw">raise</span> RuntimeError(<span class="str">"Clone failed"</span>)

    <span class="kw">return</span> dest_dir</pre></div></div>
      <h3>Metadata Extraction</h3>
      <div class="code-block"><div class="code-header"><span class="code-lang">python</span></div><div class="code-body"><pre><span class="cm"># github_utils.py:323-383</span>
<span class="kw">def</span> <span class="fn">extract_or_create_metadata</span>(dest_dir):
    metadata_file = dest_dir / <span class="str">"metadata.json"</span>

    <span class="cm"># Use existing if present</span>
    <span class="kw">if</span> metadata_file.exists():
        <span class="kw">return</span> metadata_file

    <span class="cm"># Find README</span>
    readme_path = find_readme_file(dest_dir)
    readme_content = readme_path.read_text()

    <span class="cm"># Extract JSON blocks</span>
    metadata = extract_json_from_readme(readme_content)

    <span class="cm"># Validate structure</span>
    validate_mcp_metadata(metadata)

    <span class="cm"># Write metadata.json</span>
    metadata_file.write_text(json.dumps(metadata, indent=<span class="num">2</span>))

    <span class="kw">return</span> metadata_file</pre></div></div>
      <div class="warn-box"><div class="box-icon">&#x26A0;</div><div class="box-text"><strong>Error Handling:</strong> If README not found or no valid JSON, raises <code>FileNotFoundError</code> or <code>ValueError</code>. Authentication failures raise <code>RuntimeError</code> with helpful messages.</div></div>
    `
  },
  {
    id:5,title:"Server Launch",sub:"Spawning MCP subprocesses and JSON-RPC initialization",
    content:`
      <h3>Subprocess Launch</h3>
      <div class="code-block"><div class="code-header"><span class="code-lang">python</span></div><div class="code-body"><pre><span class="cm"># package_launcher.py:106-232</span>
<span class="kw">def</span> <span class="fn">launch_mcp_using_fastapi_proxy</span>(dest_dir, lock):
    <span class="cm"># Read metadata</span>
    metadata = json.load(dest_dir / <span class="str">"metadata.json"</span>)
    servers = metadata[<span class="str">"mcpServers"</span>]

    <span class="kw">for</span> server_name, server_config <span class="kw">in</span> servers.items():
        command = server_config[<span class="str">"command"</span>]
        args = server_config.get(<span class="str">"args"</span>, [])
        env = server_config.get(<span class="str">"env"</span>, {})

        <span class="cm"># Resolve command path</span>
        npx_path = shutil.which(command)
        stdio_command = [npx_path] + args

        <span class="cm"># Spawn subprocess</span>
        process = subprocess.Popen(
            stdio_command,
            stdin=subprocess.PIPE,
            stdout=subprocess.PIPE,
            stderr=subprocess.PIPE,
            cwd=str(dest_dir),
            env={**os.environ, **env}
        )

        <span class="cm"># Initialize MCP server</span>
        initialize_mcp_server(process)

        <span class="kw">return</span> (server_name, router, process)</pre></div></div>
      <h3>JSON-RPC Initialization</h3>
      <div class="code-block"><div class="code-header"><span class="code-lang">python</span></div><div class="code-body"><pre><span class="cm"># package_launcher.py:261-362</span>
<span class="kw">def</span> <span class="fn">initialize_mcp_server</span>(process):
    init_request = {
        <span class="str">"jsonrpc"</span>: <span class="str">"2.0"</span>,
        <span class="str">"id"</span>: <span class="num">0</span>,
        <span class="str">"method"</span>: <span class="str">"initialize"</span>,
        <span class="str">"params"</span>: {
            <span class="str">"protocolVersion"</span>: <span class="str">"2024-11-05"</span>,
            <span class="str">"capabilities"</span>: {}
        }
    }

    <span class="cm"># Send to stdin</span>
    process.stdin.write(json.dumps(init_request) + <span class="str">"\\n"</span>)
    process.stdin.flush()

    <span class="cm"># Read from stdout</span>
    response = json.loads(process.stdout.readline())

    <span class="kw">if</span> <span class="str">"error"</span> <span class="kw">in</span> response:
        <span class="kw">raise</span> RuntimeError(<span class="str">f"Init failed: {response['error']}"</span>)

    <span class="cm"># Send initialized notification</span>
    process.stdin.write(json.dumps({
        <span class="str">"jsonrpc"</span>: <span class="str">"2.0"</span>,
        <span class="str">"method"</span>: <span class="str">"notifications/initialized"</span>
    }) + <span class="str">"\\n"</span>)
    process.stdin.flush()</pre></div></div>
    `
  },
  {
    id:6,title:"FastAPI Router",sub:"Creating dynamic HTTP endpoints for MCP servers",
    content:`
      <h3>Dynamic Router Creation</h3>
      <div class="code-block"><div class="code-header"><span class="code-lang">python</span></div><div class="code-body"><pre><span class="cm"># package_launcher.py:365-604</span>
<span class="kw">def</span> <span class="fn">create_mcp_router</span>(package_name, process, lock):
    router = APIRouter()

    <span class="cm"># JSON-RPC proxy endpoint</span>
    <span class="var">@router.post</span>(<span class="str">f"/{package_name}/mcp"</span>)
    <span class="kw">async def</span> <span class="fn">proxy_request</span>(request: dict):
        <span class="cm"># Write to subprocess stdin</span>
        process.stdin.write(json.dumps(request) + <span class="str">"\\n"</span>)
        process.stdin.flush()

        <span class="cm"># Read from subprocess stdout</span>
        response = json.loads(process.stdout.readline())
        <span class="kw">return</span> response

    <span class="cm"># SSE streaming endpoint</span>
    <span class="var">@router.post</span>(<span class="str">f"/{package_name}/sse"</span>)
    <span class="kw">async def</span> <span class="fn">sse_stream</span>(request: dict):
        <span class="kw">async def</span> <span class="fn">event_generator</span>():
            <span class="cm"># Stream stdout as SSE</span>
            <span class="kw">while</span> <span class="kw">True</span>:
                line = <span class="kw">await</span> asyncio.to_thread(process.stdout.readline)
                <span class="kw">yield</span> <span class="str">f"data: {line}\\n\\n"</span>

        <span class="kw">return</span> StreamingResponse(event_generator(), media_type=<span class="str">"text/event-stream"</span>)

    <span class="cm"># Tool discovery endpoint</span>
    <span class="var">@router.get</span>(<span class="str">f"/{package_name}/mcp/tools/list"</span>)
    <span class="kw">async def</span> <span class="fn">list_tools</span>():
        <span class="kw">return</span> {<span class="str">"tools"</span>: [...]}

    <span class="kw">return</span> router</pre></div></div>
      <h3>Available Endpoints</h3>
      <table class="flow-table">
        <thead><tr><th>Endpoint</th><th>Method</th><th>Purpose</th></tr></thead>
        <tbody>
          <tr><td>/{server}/mcp</td><td>POST</td><td>JSON-RPC proxy to MCP subprocess</td></tr>
          <tr><td>/{server}/sse</td><td>POST</td><td>Server-Sent Events streaming</td></tr>
          <tr><td>/{server}/mcp/tools/list</td><td>GET</td><td>List available tools</td></tr>
          <tr><td>/{server}/mcp/tools/call</td><td>POST</td><td>Execute a tool</td></tr>
          <tr><td>/docs</td><td>GET</td><td>Swagger UI documentation</td></tr>
        </tbody>
      </table>
      <div class="ok-box"><div class="box-icon">&#x2705;</div><div class="box-text"><strong>Usage:</strong> After server starts, access Swagger UI at <code>http://localhost:8090/docs</code> to explore and test endpoints interactively.</div></div>
    `
  },

      <div class="cards">
        <div class="card"><div class="card-icon">&#x1F50D;</div><div class="card-title">Check Git Clone</div><div class="card-text">Verify <code>.fmcp-packages/owner/repo/branch/</code> exists and contains files.</div></div>
        <div class="card"><div class="card-icon">&#x1F4C4;</div><div class="card-title">Inspect Metadata</div><div class="card-text">Open <code>metadata.json</code>, verify <code>command</code>, <code>args</code>, and <code>env</code> fields.</div></div>

const nav=document.getElementById('nav'),main=document.getElementById('main');
const progFill=document.getElementById('prog-fill'),progTxt=document.getElementById('prog-txt');
const DONE_KEY='gh_clone_done';let done=JSON.parse(localStorage.getItem(DONE_KEY)||'[]');
function updateProgress(){const p=Math.round(done.length/lessons.length*100);progFill.style.width=p+'%';progTxt.textContent=done.length+' / '+lessons.length}
lessons.forEach((l,i)=>{
  const ni=document.createElement('div');
  ni.className='nav-item'+(i===0?' active':'')+(done.includes(l.id)?' done':'');
  ni.innerHTML=`<div class="nav-badge">${done.includes(l.id)?'&#x2713;':l.id}</div><div class="nav-label">${l.title}</div>`;
  ni.addEventListener('click',()=>showLesson(i));nav.appendChild(ni);
  const sec=document.createElement('section');
  sec.className='lesson'+(i===0?' active':'');
  sec.innerHTML=`<div class="lesson-badge">&#x1F4E6; Lesson ${l.id}</div><h1 class="lesson-title">${l.title}</h1><p class="lesson-subtitle">${l.sub}</p>${l.content}
    <button class="complete-btn ${done.includes(l.id)?'done':''}" onclick="markDone(${l.id},this)">${done.includes(l.id)?'&#x2713; Completed':'&#x2713; Mark Complete'}</button>
    <div style="margin-top:20px;display:flex;gap:12px">
      ${i>0?`<button onclick="showLesson(${i-1})" style="padding:10px 18px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text2);cursor:pointer;font-size:13px">&#x2190; Prev</button>`:''}
      ${i<lessons.length-1?`<button onclick="showLesson(${i+1})" style="padding:10px 18px;background:var(--accent);border:none;border-radius:8px;color:#000;cursor:pointer;font-size:13px;font-weight:600">Next &#x2192;</button>`:''}</div>`;
  main.appendChild(sec);
});
function showLesson(idx){document.querySelectorAll('.lesson').forEach((s,i)=>s.classList.toggle('active',i===idx));document.querySelectorAll('.nav-item').forEach((n,i)=>n.classList.toggle('active',i===idx));window.scrollTo(0,0)}
function markDone(id,btn){if(!done.includes(id))done.push(id);localStorage.setItem(DONE_KEY,JSON.stringify(done));btn.textContent='✓ Completed';btn.classList.add('done');const ni=nav.querySelectorAll('.nav-item')[id-1];ni.classList.add('done');ni.querySelector('.nav-badge').innerHTML='&#x2713;';updateProgress()}
updateProgress();
</script>
