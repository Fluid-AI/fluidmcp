<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auth0 OAuth Implementation &#x2014; FluidMCP</title>
  <style>
    :root {
      --bg: #0d1117;
      --bg2: #161b22;
      --bg3: #1c2128;
      --border: rgba(210, 168, 255, 0.15);
      --accent: #d2a8ff;
      --accent2: #58a6ff;
      --accent3: #3fb950;
      --accent4: #f0883e;
      --danger: #f85149;
      --text: #e6edf3;
      --text2: #8b949e;
      --text3: #6e7681;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      min-height: 100vh;
      font-size: 15px;
      line-height: 1.6;
    }

    /* ─── Sidebar ─────────────────────────────────────────────────── */
    .sidebar {
      width: 280px;
      min-width: 280px;
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }

    .sidebar-header {
      padding: 24px 20px 16px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-logo {
      font-size: 22px;
      margin-bottom: 6px;
    }

    .sidebar-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .sidebar-subtitle {
      font-size: 11px;
      color: var(--text3);
      margin-top: 2px;
    }

    .sidebar-progress {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }

    .progress-label {
      font-size: 11px;
      color: var(--text2);
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .progress-bar {
      background: var(--bg3);
      border-radius: 4px;
      height: 6px;
      overflow: hidden;
    }

    .progress-fill {
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      height: 100%;
      border-radius: 4px;
      transition: width 0.4s ease;
    }

    .nav-list {
      padding: 12px 10px;
      flex: 1;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
      margin-bottom: 2px;
    }

    .nav-item:hover { background: var(--bg3); }

    .nav-item.active {
      background: rgba(210, 168, 255, 0.1);
      border: 1px solid rgba(210, 168, 255, 0.25);
    }

    .nav-item.done .nav-badge {
      background: var(--accent3);
      color: #0d1117;
    }

    .nav-badge {
      min-width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--bg3);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: var(--text2);
      flex-shrink: 0;
    }

    .nav-item.active .nav-badge {
      background: var(--accent);
      color: #0d1117;
      border-color: var(--accent);
    }

    .nav-label {
      font-size: 12.5px;
      color: var(--text2);
      line-height: 1.3;
    }

    .nav-item.active .nav-label { color: var(--text); font-weight: 500; }

    /* ─── Main content ─────────────────────────────────────────────── */
    .main {
      flex: 1;
      overflow-y: auto;
      padding: 0;
    }

    .lesson {
      display: none;
      padding: 48px 56px 80px;
      max-width: 900px;
      animation: slideInUp 0.3s ease;
    }

    .lesson.active { display: block; }

    @keyframes slideInUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .lesson-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(210, 168, 255, 0.1);
      border: 1px solid rgba(210, 168, 255, 0.3);
      color: var(--accent);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 20px;
      margin-bottom: 16px;
    }

    .lesson-title {
      font-size: 28px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
      line-height: 1.25;
    }

    .lesson-subtitle {
      font-size: 15px;
      color: var(--text2);
      margin-bottom: 36px;
      padding-bottom: 28px;
      border-bottom: 1px solid var(--border);
    }

    .lesson p {
      color: var(--text2);
      margin-bottom: 20px;
      line-height: 1.75;
    }

    .lesson h3 {
      font-size: 17px;
      font-weight: 600;
      color: var(--text);
      margin: 32px 0 14px;
    }

    .lesson h4 {
      font-size: 14px;
      font-weight: 600;
      color: var(--accent);
      margin: 20px 0 10px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* ─── Cards ─────────────────────────────────────────────────────── */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 14px;
      margin: 20px 0 28px;
    }

    .cards-2 {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      margin: 20px 0 28px;
    }

    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px;
      transition: border-color 0.2s;
    }

    .card:hover { border-color: rgba(210, 168, 255, 0.35); }

    .card-icon {
      font-size: 22px;
      margin-bottom: 10px;
    }

    .card-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }

    .card-text {
      font-size: 12.5px;
      color: var(--text2);
      line-height: 1.55;
    }

    /* ─── Info / Warn / OK boxes ─────────────────────────────────────── */
    .info-box, .warn-box, .ok-box, .danger-box {
      display: flex;
      gap: 12px;
      padding: 14px 16px;
      border-radius: 8px;
      margin: 20px 0;
      border: 1px solid;
    }

    .info-box {
      background: rgba(88, 166, 255, 0.07);
      border-color: rgba(88, 166, 255, 0.25);
    }

    .warn-box {
      background: rgba(240, 136, 62, 0.07);
      border-color: rgba(240, 136, 62, 0.3);
    }

    .ok-box {
      background: rgba(63, 185, 80, 0.07);
      border-color: rgba(63, 185, 80, 0.3);
    }

    .danger-box {
      background: rgba(248, 81, 73, 0.07);
      border-color: rgba(248, 81, 73, 0.3);
    }

    .box-icon { font-size: 16px; flex-shrink: 0; padding-top: 1px; }

    .box-text { font-size: 13px; color: var(--text2); line-height: 1.6; }
    .box-text strong { color: var(--text); }
    .box-text code {
      background: var(--bg3);
      padding: 1px 5px;
      border-radius: 4px;
      font-size: 11.5px;
      color: var(--accent);
    }

    /* ─── Code blocks ─────────────────────────────────────────────── */
    .code-block {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin: 20px 0 28px;
      overflow: hidden;
    }

    .code-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      background: var(--bg3);
      border-bottom: 1px solid var(--border);
    }

    .code-lang {
      font-size: 11px;
      font-weight: 600;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .code-file {
      font-size: 11px;
      color: var(--text3);
      font-family: monospace;
    }

    .code-body {
      padding: 18px 20px;
      overflow-x: auto;
    }

    .code-body pre {
      font-family: "JetBrains Mono", "Fira Code", "Cascadia Code", Consolas, monospace;
      font-size: 12.5px;
      line-height: 1.65;
      color: var(--text);
      white-space: pre;
    }

    /* ─── Directory tree ──────────────────────────────────────────── */
    .directory-tree {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px 22px;
      margin: 16px 0 24px;
      font-family: "JetBrains Mono", Consolas, monospace;
      font-size: 12.5px;
    }

    .dir-line {
      display: flex;
      align-items: baseline;
      gap: 6px;
      padding: 2px 0;
      line-height: 1.65;
    }

    .dir-indent-1 { padding-left: 20px; }
    .dir-indent-2 { padding-left: 40px; }
    .dir-indent-3 { padding-left: 60px; }

    .dir-icon { font-size: 13px; flex-shrink: 0; }
    .dir-name { color: var(--text2); }
    .dir-highlight { color: var(--accent); font-weight: 600; }
    .dir-comment { color: var(--text3); font-size: 11.5px; margin-left: 4px; }

    /* ─── Tables ──────────────────────────────────────────────────── */
    .data-table {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0 28px;
      font-size: 13px;
    }

    .data-table th {
      background: var(--bg3);
      color: var(--accent);
      font-weight: 600;
      padding: 10px 14px;
      text-align: left;
      border: 1px solid var(--border);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .data-table td {
      padding: 9px 14px;
      border: 1px solid var(--border);
      color: var(--text2);
      vertical-align: top;
    }

    .data-table tr:nth-child(even) td { background: rgba(255,255,255,0.02); }
    .data-table td code {
      background: var(--bg3);
      padding: 1px 5px;
      border-radius: 4px;
      font-size: 11.5px;
      color: var(--accent2);
    }
    .data-table td strong { color: var(--text); }

    /* ─── Flow steps ──────────────────────────────────────────────── */
    .flow-steps {
      margin: 20px 0 28px;
    }

    .flow-step {
      display: flex;
      gap: 16px;
      margin-bottom: 14px;
      align-items: flex-start;
    }

    .flow-step-num {
      min-width: 30px;
      height: 30px;
      background: rgba(210, 168, 255, 0.15);
      border: 1px solid rgba(210, 168, 255, 0.35);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
      flex-shrink: 0;
    }

    .flow-step-body {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      flex: 1;
    }

    .flow-step-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
    }

    .flow-step-desc {
      font-size: 12.5px;
      color: var(--text2);
      line-height: 1.55;
    }

    .flow-step-desc code {
      background: var(--bg3);
      padding: 1px 5px;
      border-radius: 4px;
      font-size: 11.5px;
      color: var(--accent);
    }

    .flow-connector {
      width: 1px;
      height: 14px;
      background: var(--border);
      margin: 0 0 0 14px;
    }

    /* ─── Env var list ────────────────────────────────────────────── */
    .env-list { margin: 16px 0 24px; }

    .env-item {
      display: flex;
      gap: 12px;
      padding: 12px 14px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 8px;
      align-items: flex-start;
    }

    .env-key {
      font-family: monospace;
      font-size: 12px;
      color: var(--accent2);
      font-weight: 700;
      min-width: 240px;
      flex-shrink: 0;
    }

    .env-desc { font-size: 12.5px; color: var(--text2); }
    .env-required {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 10px;
      font-weight: 700;
      background: rgba(248, 81, 73, 0.15);
      color: var(--danger);
      border: 1px solid rgba(248, 81, 73, 0.3);
      margin-left: auto;
      flex-shrink: 0;
    }
    .env-optional {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 10px;
      font-weight: 700;
      background: rgba(63, 185, 80, 0.1);
      color: var(--accent3);
      border: 1px solid rgba(63, 185, 80, 0.25);
      margin-left: auto;
      flex-shrink: 0;
    }

    /* ─── Navigation buttons ─────────────────────────────────────── */
    .lesson-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 48px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      gap: 12px;
    }

    .nav-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--bg2);
      color: var(--text2);
      transition: all 0.15s;
      text-decoration: none;
    }

    .nav-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(210, 168, 255, 0.07);
    }

    .nav-btn.primary {
      background: rgba(210, 168, 255, 0.12);
      border-color: rgba(210, 168, 255, 0.35);
      color: var(--accent);
    }

    .nav-btn.primary:hover {
      background: rgba(210, 168, 255, 0.2);
    }

    .nav-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      pointer-events: none;
    }

    .complete-btn {
      padding: 10px 22px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid rgba(63, 185, 80, 0.4);
      background: rgba(63, 185, 80, 0.1);
      color: var(--accent3);
      transition: all 0.15s;
    }

    .complete-btn:hover {
      background: rgba(63, 185, 80, 0.18);
      border-color: var(--accent3);
    }

    .complete-btn.done {
      background: rgba(63, 185, 80, 0.18);
      border-color: var(--accent3);
      cursor: default;
    }

    /* ─── Inline code ─────────────────────────────────────────────── */
    code {
      background: var(--bg3);
      padding: 1px 6px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 12.5px;
      color: var(--accent2);
      border: 1px solid rgba(88, 166, 255, 0.15);
    }

    /* ─── Scrollbar ───────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text3); }

    /* ─── Dos and Donts ───────────────────────────────────────────── */
    .dos-donts {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin: 16px 0 28px;
    }

    .dos-box, .donts-box {
      border-radius: 10px;
      padding: 16px;
      border: 1px solid;
    }

    .dos-box {
      background: rgba(63, 185, 80, 0.05);
      border-color: rgba(63, 185, 80, 0.25);
    }

    .donts-box {
      background: rgba(248, 81, 73, 0.05);
      border-color: rgba(248, 81, 73, 0.25);
    }

    .dos-title, .donts-title {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .dos-title { color: var(--accent3); }
    .donts-title { color: var(--danger); }

    .dos-item, .donts-item {
      font-size: 12.5px;
      color: var(--text2);
      padding: 5px 0;
      display: flex;
      gap: 8px;
      align-items: flex-start;
      line-height: 1.5;
    }

    /* ─── Mode comparison ─────────────────────────────────────────── */
    .mode-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
    }

    .mode-oauth { background: rgba(210, 168, 255, 0.15); color: var(--accent); }
    .mode-bearer { background: rgba(88, 166, 255, 0.15); color: var(--accent2); }
    .mode-anon { background: rgba(63, 185, 80, 0.1); color: var(--accent3); }
  </style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo">&#x1F510;</div>
    <div class="sidebar-title">Auth0 OAuth</div>
    <div class="sidebar-subtitle">FluidMCP Authentication Guide</div>
  </div>
  <div class="sidebar-progress">
    <div class="progress-label">
      <span>Progress</span>
      <span id="prog-label">0 / 8</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="prog-fill" style="width:0%"></div>
    </div>
  </div>
  <div class="nav-list" id="nav"></div>
</aside>

<main class="main" id="main"></main>

<script>
const STORAGE_KEY = 'fmcp_auth_done';
let done = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
let currentIdx = 0;

const lessons = [
  {
    id: 1,
    title: "Authentication Overview",
    sub: "Modes, concepts, and why Auth0",
    content: `
      <p>FluidMCP supports three distinct authentication modes that can be selected at server startup. Understanding which mode to use &#x2014; and how each works &#x2014; is the first step to securing your deployment.</p>

      <div class="cards">
        <div class="card">
          <div class="card-icon">&#x1F513;</div>
          <div class="card-title">No-Auth (Dev Mode)</div>
          <div class="card-text">All requests pass through as <code>anonymous</code>. Zero configuration needed. Use only for local development and testing.</div>
        </div>
        <div class="card">
          <div class="card-icon">&#x1F511;</div>
          <div class="card-title">Bearer Token</div>
          <div class="card-text">A static secret token passed in the <code>Authorization: Bearer</code> header. Ideal for server-to-server API access and CLI tools.</div>
        </div>
        <div class="card">
          <div class="card-icon">&#x1F512;</div>
          <div class="card-title">OAuth2 / Auth0</div>
          <div class="card-text">Full browser-based login with Auth0 as the Identity Provider. Issues JWTs, supports social login, and stores tokens in httpOnly cookies.</div>
        </div>
      </div>

      <h3>Why Auth0?</h3>
      <p>Auth0 is a managed Identity Provider (IdP) that handles the hard parts of authentication: user databases, password hashing, MFA, social logins (Google, GitHub, Zoho, Atlassian), and token issuance. FluidMCP integrates with Auth0 using the standard <strong>OAuth 2.0 Authorization Code Flow</strong>.</p>

      <div class="cards">
        <div class="card">
          <div class="card-icon">&#x1F504;</div>
          <div class="card-title">OAuth2 Authorization Code Flow</div>
          <div class="card-text">The browser-safe OAuth flow. FluidMCP never handles user passwords &#x2014; Auth0 does. Only short-lived authorization codes cross the browser.</div>
        </div>
        <div class="card">
          <div class="card-icon">&#x1F510;</div>
          <div class="card-title">JWT Validation with JWKS</div>
          <div class="card-text">Auth0 signs tokens with RS256. FluidMCP validates them using Auth0&#39;s public JWKS endpoint with an in-process TTL cache.</div>
        </div>
        <div class="card">
          <div class="card-icon">&#x1F36A;</div>
          <div class="card-title">httpOnly Cookie Security</div>
          <div class="card-text">Access tokens are stored in <code>httpOnly</code> cookies &#x2014; invisible to JavaScript &#x2014; preventing XSS token theft entirely.</div>
        </div>
      </div>

      <div class="info-box">
        <div class="box-icon">&#x2139;</div>
        <div class="box-text">
          <strong>When to use each mode:</strong><br>
          &#x2022; <strong>No-auth</strong> &#x2014; Local development, internal-only tools with no sensitive data<br>
          &#x2022; <strong>Bearer token</strong> &#x2014; CI/CD pipelines, machine-to-machine API clients, Railway deployments<br>
          &#x2022; <strong>Auth0 OAuth</strong> &#x2014; Any browser-facing deployment where users need to log in individually
        </div>
      </div>
    `
  },
  {
    id: 2,
    title: "Directory Structure",
    sub: "All auth-related files and their roles",
    content: `
      <p>The Auth0 integration spans both the backend (Python/FastAPI) and the frontend (React/TypeScript). Here is the complete map of every relevant file.</p>

      <div class="directory-tree">
        <div class="dir-line">
          <span class="dir-icon">&#x1F4C1;</span>
          <span class="dir-highlight">fluidmcp/cli/</span>
        </div>
        <div class="dir-line dir-indent-1">
          <span class="dir-icon">&#x1F4C4;</span>
          <span class="dir-highlight">auth.py</span>
          <span class="dir-comment"># Bearer token: verify_token(), get_token(), _validate_bearer_token()</span>
        </div>
        <div class="dir-line dir-indent-1">
          <span class="dir-icon">&#x1F4C1;</span>
          <span class="dir-name">auth/</span>
        </div>
        <div class="dir-line dir-indent-2">
          <span class="dir-icon">&#x1F4C4;</span>
          <span class="dir-highlight">config.py</span>
          <span class="dir-comment"># Auth0Config pydantic model + from_env_or_file() loader</span>
        </div>
        <div class="dir-line dir-indent-2">
          <span class="dir-icon">&#x1F4C4;</span>
          <span class="dir-highlight">routes.py</span>
          <span class="dir-comment"># /auth/login, /auth/callback, /auth/me, /auth/logout, /auth/config</span>
        </div>
        <div class="dir-line dir-indent-2">
          <span class="dir-icon">&#x1F4C4;</span>

    content: `
      <p>After the OAuth flow, every subsequent API request carries the Auth0 access token (in the cookie or Authorization header). The server must validate this JWT on each request &#x2014; without hitting Auth0&#39;s servers every time. That&#39;s what <code>JWKSCache</code> and <code>validate_oauth_jwt()</code> handle.</p>

      <h3>How JWT RS256 Works</h3>
      <div class="cards">
        <div class="card">
          <div class="card-icon">&#x1F511;</div>
          <div class="card-title">Auth0 Signs with Private Key</div>
          <div class="card-text">Auth0 holds an RSA private key and uses it to sign every JWT with RS256. You never see this key.</div>
        </div>
        <div class="card">
          <div class="card-icon">&#x1F512;</div>
          <div class="card-title">JWKS = Public Keys</div>
          <div class="card-text">Auth0 publishes the matching RSA public keys at <code>https://&#x7B;domain&#x7D;/.well-known/jwks.json</code>. Anyone can fetch and use them to verify signatures.</div>
        </div>
        <div class="card">
          <div class="card-icon">&#x1F50D;</div>
          <div class="card-title">FluidMCP Verifies</div>
          <div class="card-text">Using the public key + <code>python-jose</code>, FluidMCP verifies the signature, issuer (<code>iss</code>), audience (<code>aud</code>), and expiry (<code>exp</code>) &#x2014; all in-process.</div>
        </div>
      </div>

      <h3>JWKSCache Class (<code>auth/jwt_validator.py</code>)</h3>
      <p>Fetching JWKS on every request would be slow and would hit Auth0 rate limits. <code>JWKSCache</code> solves this with a TTL-based in-process cache:</p>

      <div class="code-block">
        <div class="code-header">
          <span class="code-lang">python</span>
          <span class="code-file">fluidmcp/cli/auth/jwt_validator.py</span>
        </div>
        <div class="code-body"><pre>class JWKSCache:
    """Cache for JWKS keys with TTL to avoid repeated fetches"""

    def __init__(self, jwks_url: str, ttl_seconds: int = 3600):
        self.jwks_url = jwks_url
        self.ttl = timedelta(seconds=ttl_seconds)   # Default: 1 hour
        self._keys: Optional[Dict] = None
        self._expires_at: Optional[datetime] = None
        self._lock = threading.Lock()               # Thread-safe access

    def get_signing_key(self, kid: str):
        with self._lock:
            # Refresh if cache is empty or expired
            if (self._keys is None
                    or self._expires_at is None
                    or datetime.utcnow() >= self._expires_at):
                self._refresh_keys()

            # Look up key by Key ID
            for key_data in self._keys.get("keys", []):
                if key_data.get("kid") == kid:
                    return jwk.construct(key_data)

        raise ValueError(f"Key ID {kid} not found in JWKS")</pre></div>
      </div>

      <h3>validate_oauth_jwt() &#x2014; Step by Step</h3>
      <div class="flow-steps">
        <div class="flow-step">
          <div class="flow-step-num">1</div>
          <div class="flow-step-body">
            <div class="flow-step-title">Decode header (unverified) to extract <code>kid</code></div>
            <div class="flow-step-desc"><code>jwt.get_unverified_header(token)</code> &#x2014; reads the JWT header without signature check. Raises if <code>kid</code> field is missing.</div>
          </div>

        <div class="flow-step">
          <div class="flow-step-num">2</div>
          <div class="flow-step-body">
            <div class="flow-step-title">Retrieve public key from <code>JWKSCache.get_signing_key(kid)</code></div>
            <div class="flow-step-desc">Returns the cached RSA public key matching the <code>kid</code>. Cache auto-refreshes from Auth0 if expired.</div>
          </div>
        </div>
        <div class="flow-connector"></div>
        <div class="flow-step">
          <div class="flow-step-num">3</div>
          <div class="flow-step-body">
            <div class="flow-step-title">Full JWT decode with <code>python-jose</code></div>
            <div class="flow-step-desc"><code>jwt.decode(token, signing_key, algorithms=["RS256"], audience=audience, issuer="https://&#x7B;domain&#x7D;/")</code> &#x2014; verifies signature, expiry, issuer, and audience simultaneously.</div>
          </div>
        </div>
        <div class="flow-connector"></div>

          <div class="flow-step-num">4</div>
          <div class="flow-step-body">
            <div class="flow-step-title">Return user context dict</div>
            <div class="flow-step-desc">Extracts <code>sub</code> &#x2192; <code>user_id</code>, <code>email</code>, <code>name</code> from payload. Returns <code>&#x7B;"user_id": sub, "email": ..., "name": ..., "auth_method": "oauth"&#x7D;</code>.</div>
          </div>
        </div>
      </div>

      <div class="info-box">
        <div class="box-icon">&#x1F504;</div>
        <div class="box-text">
          <strong>Key rotation handling:</strong> If <code>get_signing_key(kid)</code> raises <code>ValueError: Key ID ... not found</code>, <code>validate_oauth_jwt()</code> immediately force-invalidates the cache (<code>cache._keys = None</code>) and retries once with fresh keys fetched from <code>/.well-known/jwks.json</code>. This handles Auth0&#39;s periodic key rotation transparently. The <code>retry_on_key_error=False</code> parameter prevents infinite loops on the second attempt.
        </div>
      </div>

      <div class="code-block">
        <div class="code-header">
          <span class="code-lang">python</span>
          <span class="code-file">fluidmcp/cli/auth/jwt_validator.py &#x2014; key rotation excerpt</span>
        </div>
        <div class="code-body"><pre>except ValueError as e:
    # Handle stale JWKS cache &#x2014; Auth0 may have rotated keys
    if "Key ID" in str(e) and "not found" in str(e) and retry_on_key_error:
        logger.warning(f"Key not found in JWKS cache, refreshing: {e}")

        # Force cache refresh by invalidating cached keys
        cache = _get_jwks_cache()
        with cache._lock:
            cache._keys = None
            cache._expires_at = None

        # Retry once with fresh keys
        return await validate_oauth_jwt(token, retry_on_key_error=False)</pre></div>

      <p>All protected routes in FluidMCP use a single FastAPI dependency: <code>get_current_user()</code> from <code>auth/dependencies.py</code>. It transparently handles all three authentication modes based on environment variables set at startup.</p>

      <h3>Three-Mode Decision Logic</h3>
      <div class="code-block">

    request: Request,
    credentials: Optional[HTTPAuthorizationCredentials] = Depends(security)
) -> Dict[str, Optional[str]]:

    auth0_mode  = os.getenv("FMCP_AUTH0_MODE")  == "true"
    secure_mode = os.getenv("FMCP_SECURE_MODE") == "true"

    # &#x2500;&#x2500; Mode 1: No auth &#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;
    if not auth0_mode and not secure_mode:
        return {"user_id": "anonymous", "email": None,
                "name": "Anonymous", "auth_method": "none"}

    # &#x2500;&#x2500; Token extraction (priority order) &#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;
    token = None
    if credentials:                                   # 1. Authorization header
        token = credentials.credentials
    elif "fmcp_auth_token" in request.cookies:        # 2. httpOnly cookie
        token = request.cookies["fmcp_auth_token"]

    if not token:
        raise HTTPException(401, "Authentication required.")

    # &#x2500;&#x2500; Mode 2: OAuth JWT validation &#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;
    if auth0_mode:
        user = await validate_oauth_jwt(token)  # raises on invalid
        return user  # auth_method = "oauth"

    # &#x2500;&#x2500; Mode 3: Bearer token (constant-time compare) &#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;
    if secure_mode:
        bearer_token = os.getenv("FMCP_BEARER_TOKEN")
        if token == bearer_token:
            return {"user_id": f"bearer_{token[:8]}", "email": None,
                    "name": f"Bearer User {token[:8]}", "auth_method": "bearer"}

    raise HTTPException(401, "Invalid or expired token")</pre></div>

      <p>The React frontend handles authentication through a context provider that wraps the entire app. Authentication state is lazy-loaded &#x2014; the provider does not call the backend on mount, only when a component explicitly checks auth.</p>

      <h3>AuthProvider (<code>contexts/AuthContext.tsx</code>)</h3>
      <p>The <code>AuthProvider</code> component holds the auth state (<code>user</code>, <code>authConfig</code>, <code>loading</code>) and exposes it via the <code>useAuth()</code> hook. It is mounted at the top of the React tree so all child components can access auth state.</p>

      <div class="code-block">
        <div class="code-header">
          <span class="code-lang">tsx</span>
          <span class="code-file">fluidmcp/frontend/src/contexts/AuthContext.tsx</span>
        </div>
        <div class="code-body"><pre>// AuthContextType &#x2014; what useAuth() returns
interface AuthContextType {
  user: User | null;
  authConfig: AuthConfig | null;
  loading: boolean;
  checkAuth: () => Promise&lt;boolean&gt;;
  requireAuth: (returnUrl?: string) => Promise&lt;boolean&gt;;
  logout: () => Promise&lt;void&gt;;
  isAuthenticated: boolean;
}

// Usage in a protected component
function Dashboard() {
  const { user, isAuthenticated, requireAuth } = useAuth();

  useEffect(() => {
    requireAuth('/dashboard');  // redirects to /auth/login if not authed
  }, []);

  if (!isAuthenticated) return &lt;LoadingSpinner /&gt;;
  return &lt;div&gt;Welcome, {user?.name}!&lt;/div&gt;;
}</pre></div>
      </div>

      <h3>requireAuth() Logic</h3>
      <p>When <code>requireAuth(returnUrl)</code> is called and the user is not authenticated:</p>
      <div class="flow-steps">
        <div class="flow-step">
          <div class="flow-step-num">1</div>
          <div class="flow-step-body">
            <div class="flow-step-title">Calls <code>checkAuth()</code> which calls <code>authService.getCurrentUser()</code></div>
            <div class="flow-step-desc">GET <code>/auth/me</code> &#x2014; includes the cookie automatically via <code>credentials: 'include'</code>. Returns <code>null</code> on 401.</div>
          </div>
        </div>
        <div class="flow-connector"></div>
        <div class="flow-step">
          <div class="flow-step-num">2</div>
          <div class="flow-step-body">
            <div class="flow-step-title">Stores return URL in <code>sessionStorage</code></div>
            <div class="flow-step-desc">Key: <code>auth_return_url</code>. Prepends <code>/ui</code> prefix if not already present (matches Vite base path config).</div>
          </div>
        </div>
        <div class="flow-connector"></div>
        <div class="flow-step">
          <div class="flow-step-num">3</div>
          <div class="flow-step-body">
            <div class="flow-step-title">Redirects browser to <code>/auth/login</code></div>
            <div class="flow-step-desc"><code>authService.login()</code> sets <code>window.location.href = '/auth/login'</code>, starting the OAuth flow.</div>
          </div>
        </div>
      </div>

      <h3>authService (<code>services/auth.ts</code>)</h3>
      <div class="code-block">
        <div class="code-header">
          <span class="code-lang">typescript</span>
          <span class="code-file">fluidmcp/frontend/src/services/auth.ts</span>
        </div>
        <div class="code-body"><pre>export const authService = {
  // Check OAuth config on backend (/auth/config)
  async getConfig(): Promise&lt;AuthConfig&gt; {
    return apiClient.getAuthConfig();
  },

  // GET /auth/me &#x2014; uses the httpOnly cookie automatically
  async getCurrentUser(): Promise&lt;User | null&gt; {
    try {
      return await apiClient.getCurrentUser();
    } catch {
      return null;  // 401 = not authenticated
    }
  },

  // Redirect to backend OAuth entry point
  login() {
    window.location.href = '/auth/login';
  },

  // POST /auth/logout &#x2014; clears cookie server-side
  async logout() {
    await apiClient.logout();
    window.location.href = '/';
  }
};</pre></div>
      </div>

      <h3>Why Cookies Work Automatically</h3>
      <p>All API calls from the frontend use <code>credentials: 'include'</code> in the underlying <code>fetch()</code> calls. This tells the browser to attach any matching cookies (including <code>fmcp_auth_token</code>) to every request &#x2014; without any JavaScript reading or transmitting the token value.</p>

        <div class="box-text">

        </div>
      </div>

      <p>The CLI enforces a mutex between <code>--secure</code> and <code>--auth0</code> — you cannot pass both flags at once. However, when environment variables are set directly (e.g. in Railway or Docker), both <code>FMCP_AUTH0_MODE=true</code> and <code>FMCP_SECURE_MODE=true</code> can be active simultaneously. In that case <code>get_current_user()</code> in <code>dependencies.py</code> applies a silent fallback:</p>

      <p>This fallback is intentional for gradual auth migrations, but should be used deliberately. Avoid setting both env vars in production unless you understand the precedence.</p>

      <h3>Security Headers (from <code>server.py :: add_security_headers</code>)</h3>
      <div class="code-block">
        <div class="code-header">

        <div class="code-body"><pre>@app.middleware("http")
async def add_security_headers(request: Request, call_next):
    response = await call_next(request)

    # Prevent XSS via Content Security Policy
    response.headers["Content-Security-Policy"] = (
        "default-src 'self'; "
        "script-src 'self' 'unsafe-inline'; "
        "style-src 'self' 'unsafe-inline'; "
        "img-src 'self' data: https:; "

            <td>Auth0 Allowed Callback URL not updated after Codespace restart</td>
            <td>Re-run <code>fmcp serve --auth0</code> (prints new URL) and update Auth0 dashboard</td>
          </tr>
        </tbody>
      </table>

      <div class="ok-box">
        <div class="box-icon">&#x1F680;</div>
        <div class="box-text">
          <strong>You&#39;ve completed the Auth0 OAuth tutorial!</strong> You now understand the full authentication pipeline: from env configuration and URL detection, through the OAuth authorization code flow, JWT validation with JWKS caching, the unified <code>get_current_user()</code> dependency, frontend AuthContext integration, and the security layer protecting every deployment.
        </div>
      </div>
    `
  }
];

// ─── Render ────────────────────────────────────────────────────────────────
const nav  = document.getElementById('nav');
const main = document.getElementById('main');

lessons.forEach((l, i) => {
  // Nav item
  const ni = document.createElement('div');
  ni.className = 'nav-item' + (i === 0 ? ' active' : '') + (done.includes(l.id) ? ' done' : '');
  ni.dataset.idx = i;
  ni.innerHTML = `
    <div class="nav-badge">${done.includes(l.id) ? '&#x2713;' : l.id}</div>
    <div class="nav-label">${l.title}</div>
  `;
  ni.addEventListener('click', () => showLesson(i));
  nav.appendChild(ni);

  // Lesson section
  const sec = document.createElement('section');
  sec.className = 'lesson' + (i === 0 ? ' active' : '');
  sec.dataset.id = l.id;

  const isDone = done.includes(l.id);
  const prevBtn = i > 0
    ? `<button class="nav-btn" onclick="showLesson(${i - 1})">&#x2190; ${lessons[i-1].title}</button>`
    : `<button class="nav-btn" disabled>&#x2190; Previous</button>`;
  const nextBtn = i < lessons.length - 1
    ? `<button class="nav-btn primary" onclick="showLesson(${i + 1})">${lessons[i+1].title} &#x2192;</button>`
    : `<button class="nav-btn primary" disabled>&#x2714; All lessons complete</button>`;

  sec.innerHTML = `
    <div class="lesson-badge">&#x1F510; Lesson ${l.id} of ${lessons.length}</div>
    <h1 class="lesson-title">${l.title}</h1>
    <p class="lesson-subtitle">${l.sub}</p>
    ${l.content}
    <div class="lesson-footer">
      ${prevBtn}
      <button
        class="complete-btn${isDone ? ' done' : ''}"
        id="btn-${l.id}"
        onclick="markDone(${l.id}, this)">
        ${isDone ? '&#x2713; Completed' : 'Mark Complete'}
      </button>
      ${nextBtn}
    </div>
  `;
  main.appendChild(sec);
});

updateProgress();

function showLesson(idx) {
  currentIdx = idx;

  // Update nav
  document.querySelectorAll('.nav-item').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });

  // Update sections
  document.querySelectorAll('.lesson').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });

  // Scroll main to top
  document.getElementById('main').scrollTop = 0;
}

function markDone(id, btn) {
  if (!done.includes(id)) {
    done.push(id);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(done));
  }
  btn.textContent = '✓ Completed';
  btn.className = 'complete-btn done';

  // Update nav badge
  document.querySelectorAll('.nav-item').forEach(el => {
    const lessonId = lessons[parseInt(el.dataset.idx)].id;
    if (lessonId === id) {
      el.classList.add('done');
      el.querySelector('.nav-badge').innerHTML = '&#x2713;';
    }
  });

  updateProgress();
}

function updateProgress() {
  const pct = Math.round((done.length / lessons.length) * 100);
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-label').textContent = done.length + ' / ' + lessons.length;
}
</script>
</body>
</html>
